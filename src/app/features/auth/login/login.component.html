
<div class  = "login-page">
  <div class = "login-card">
     <div class = "login-header">
        

      <span class = "material-icons logo-icon">monitoring</span>
      <h2 >Enterprise Monitoring</h2>
      <p> Sign in to access the dashboard </p>



      <form [formGroup] = "loginForm" (ngSubmit) = "onSubmit()" class="login-form">
        

        <div *ngIf = "error$ | async as error" class="error-banner" role="alert">
          <span class="material-icons error-icon">error_outline</span>
          {{ error }}
        </div>

        <div class="form-group">

          <label for="username">Username</label>
          <div class="input-wrapper">

            <span class="material-icons input-icon">person</span>
            <input 
               id="username" 
               formControlName="username"
               type="text" 
               placeholder="Enter your username" 
               autocomplete="username"
               [attr.aria-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
               >
          </div>
            <span
          
            *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" 
            class="validation-error"
            class="field-error"
            role="alert"
            >

            UserName is required
          </span>
        </div>

        

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="material-icons input-icon">lock</span>
            <input 
               id="password" 
               formControlName="password" 
               type="password" 
               placeholder="Enter your password" 
                autocomplete="current-password"
               [attr.aria-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               >
          </div>

          <span 
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" 
            class="validation-error"
            class="field-error"
            role="alert"
            >
            Password is required
          </span>
        </div>
        <button 
           type="submit" 
           class="login-button" 
           [disabled]="loginForm.invalid || (loading$ | async)"
           
           >



           @if(loading$ | async){
              <span class="btn-loading">
                <span class="spinner-small"></span>
                Signing In...
              </span>
           }@else{
              <span>Sign In</span>
           }
          </button>


          <p class="hint">
            <span class="material-icons hint-icon">info</span>
            Use any username and password to sign in (Mock Auth)
          </p>
      </form>
  </div>
</div>
