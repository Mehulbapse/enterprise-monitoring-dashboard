<div class="dashboard">
  <div *ngIf="error$ | async as error" class="error-banner" role="alert">
    <span class="material-icons error-icon">warning</span>
    {{ error }}
    <button (click)="dismissError()" class="dismiss-btn" aria-label="Dismiss Error"></button>
  </div>

  <!-- KPI Cards Rows -->
  <section class="kpi-row" aria-label="Key Performance Indicators">
    <app-kpi-card
      title="Total Alerts"
      [value]="kpiData.totalAlerts"
      icon="notifications_active"
      colorClass="color-red"
      format="number"
      [trend]="-3"
    >
    </app-kpi-card>

    <app-kpi-card
      title="Active Users"
      [value]="kpiData.activeUsers"
      icon="group"
      colorClass="color-blue"
      format="number"
      [trend]="12"
    >
    </app-kpi-card>

    <app-kpi-card
      title="System Health"
      [value]="kpiData.systemHealth"
      icon="health_and_safety"
      colorClass="color-green"
      format="percentage"
      [trend]="2"
    >
    </app-kpi-card>

    <app-kpi-card
      title="Response Time"
      [value]="kpiData.responseTime"
      icon="speed"
      colorClass="color-orange"
      format="ms"
      [trend]="-8"
    >
    </app-kpi-card>
  </section>

  <!-- chart rows -->

  <section class="charts-row" aria-label="Dashboardd Charts">
    <div class="chart-card chart-wide">
      <h3>Real-Time System Load</h3>
      <app-chart *ngIf="lineChartConfig" chartType="line" [config]="lineChartConfig" height="280px">
      </app-chart>
    </div>

    <div class="chart-card">
      <h3>System Metrics</h3>

      <app-chart *ngIf="barChartConfig" chartType="bar" [config]="barChartConfig" height="280px">
      </app-chart>
    </div>

    <div class="chart-card">
      <h3>Alert Distribution</h3>

      <app-chart *ngIf="pieChartConfig" chartType="pie" [config]="pieChartConfig" height="280px">
      </app-chart>
    </div>
  </section>

  <!-- Filters Row -->

  <section class="filters-row" aria-label="Dashboard Filters">
    <div class="filter-group">
      <div class="search-wrapper">
        <span class="material-icons search-icon">search</span>
        <input
          type="text"
          placeholder="Search alerts..."
          [formControl]="searchControls"
          class="search-input"
          aria-label="Search Alerts"
        />
      </div>
    </div>

    <div class="filter-group">
      <select
        [formControl]="severityControls"
        class="filter-select"
        aria-label="Filter by Severity"
      >
        <option value="all">All Severities</option>
        <option value="critical">Critical</option>
        <option value="warning">Warning</option>
        <option value="info">Info</option>
      </select>

      <select [formControl]="statusControls" class="filter-select" aria-label="Filter by Status">
        <option value="all">All Statuses</option>
        <option value="active">Active</option>
        <option value="acknowledged">Acknowledged</option>
        <option value="resolved">Resolved</option>
      </select>

      <button (click)="resetFilters()" class="reset-btn" aria-label="Reset Filters">
        <span class="material-icons">refresh</span>
        Reset
      </button>
    </div>
  </section>

  <!-- Alerts Table -->

  <section class="table-section" aria-label="Alerts Table">
    <h3>Recent Alerts</h3>

    <app-data-table
      [columns]="tableColumns"
      [data]="alertsData"
      [loading]="tableLoading"
      [totalItems]="totalAlerts"
      [currentPage]="currentPage"
      [pageSize]="pageSize"
      [currentSort]="currentSort"
      (pageChange)="onPageChange($event)"
      (sortChange)="onSortChange($event)"
    >
    </app-data-table>
  </section>
</div>
